<!DOCTYPE html>
<html>
<head>
<title>Image Gallery</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    margin: 0;
    padding: 20px;
}

h2 {
    margin-bottom: 15px;
    color: #333;
}

/* BUTTONS */
.buttons {
    margin-bottom: 20px;
}

button {
    margin: 5px;
    padding: 10px 18px;
    border: none;
    border-radius: 25px;
    background: #2c3e50;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    font-size: 14px;
}

button:hover {
    background: #34495e;
    transform: scale(1.05);
}

button.active {
    background: #3498db;
}

/* GALLERY GRID */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    max-width: 900px;
    margin: auto;
}

/* IMAGE CARD */
.img-box {
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    position: relative;
    transition: 0.3s;
}

/* IMAGE */
.img-box img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    transition: 0.4s;
}

/* HOVER EFFECT */
.img-box:hover img {
    transform: scale(1.2);
}

.img-box::after {
    content: "View";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.4);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    font-size: 16px;
    transition: 0.3s;
}

.img-box:hover::after {
    opacity: 1;
}
</style>
</head>

<body>

<h2>✨ Image Gallery</h2>

<!-- FILTER BUTTONS -->
<div class="buttons">
    <button onclick="filterImages('all')" class="active">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('cars')">Cars</button>
</div>

<!-- GALLERY -->
<div class="gallery">

    <!-- Use your own images like img1.jpg, img2.jpg -->
    <div class="img-box nature">
        <img src="img1.jpg">
    </div>

    <div class="img-box cars">
        <img src="img2.jpg">
    </div>

    <div class="img-box nature">
        <img src="img3.jpg">
    </div>

    <div class="img-box cars">
        <img src="img4.jpg">
    </div>

    <div class="img-box nature">
        <img src="img5.jpg">
    </div>

    <div class="img-box cars">
        <img src="img6.jpg">
    </div>

</div>

<script>

function filterImages(category) {

    let items = document.getElementsByClassName("img-box");

    for (let i = 0; i < items.length; i++) {

        if (category === "all") {
            items[i].style.display = "block";
        } 
        else if (items[i].classList.contains(category)) {
            items[i].style.display = "block";
        } 
        else {
            items[i].style.display = "none";
        }
    }

    // Active button highlight
    let btns = document.querySelectorAll("button");
    btns.forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");
}

</script>

</body>
</html>
