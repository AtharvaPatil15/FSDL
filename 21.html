<!DOCTYPE html>
<html>
<head>
<title>Weekly Timetable</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f4f6fb;
    padding: 30px;
}

h2 {
    text-align: center;
    color: #2c3e50;
    margin-bottom: 20px;
}

.table-container {
    width: 85%;
    margin: auto;
    background: #ffffff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

table {
    width: 100%;
    border-collapse: collapse;
    text-align: center;
}

th, td {
    padding: 12px;
    border: 1px solid #e0e0e0;
}

th {
    background: #2c3e50;
    color: white;
    font-weight: 500;
}

tr:nth-child(even) {
    background-color: #fafafa;
}

tr:hover {
    background-color: #f1f5ff;
    transition: 0.2s;
}

.lunch {
    background: #eaeaea;
    font-weight: 600;
}

.special {
    font-weight: 600;
    color: #34495e;
}

@media(max-width: 768px) {
    th, td {
        padding: 8px;
        font-size: 12px;
    }
}

</style>
</head>

<body>

<h2>Weekly Timetable</h2>

<div class="table-container">
<table>

<tr>
    <th>Day/Time</th>
    <th>9-10</th>
    <th>10-11</th>
    <th>11-12</th>
    <th>12-1</th>
    <th>1-2</th>
    <th>2-3</th>
</tr>

<tr>
    <td><b>Monday</b></td>
    <td>Math</td>
    <td>OS</td>
    <td>DBMS</td>
    <td rowspan="5" class="lunch">Lunch</td>
    <td>CN</td>
    <td>Java</td>
</tr>

<tr>
    <td><b>Tuesday</b></td>
    <td>DBMS</td>
    <td colspan="2" class="special">Lab</td>
    <td>OS</td>
    <td>Math</td>
</tr>

<tr>
    <td><b>Wednesday</b></td>
    <td>CN</td>
    <td>Math</td>
    <td>Java</td>
    <td colspan="2" class="special">Seminar</td>
</tr>

<tr>
    <td><b>Thursday</b></td>
    <td>OS</td>
    <td>DBMS</td>
    <td>Math</td>
    <td>Java</td>
    <td>CN</td>
</tr>

<tr>
    <td><b>Friday</b></td>
    <td colspan="3" class="special">Project</td>
    <td>OS</td>
    <td>DBMS</td>
</tr>

</table>
</div>

</body>
</html>
