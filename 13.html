<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 25px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 15px;
            color: #333;
        }

        /* Input section */
        .input-box {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #f1f3f6;
            outline: none;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
        }

        .add-btn {
            background: #667eea;
        }

        .add-btn:hover {
            background: #4b5bdc;
        }

        /* Task list */
        ul {
            margin-top: 20px;
        }

        li {
            list-style: none;
            background: #f4f7ff;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-text {
            flex: 1;
            text-align: left;
        }

        /* Buttons inside list */
        .actions {
            display: flex;
            gap: 5px;
        }

        .edit {
            background: #ffc107;
        }

        .delete {
            background: #e74c3c;
        }

        .edit:hover {
            background: #e0a800;
        }

        .delete:hover {
            background: #c0392b;
        }

    </style>
</head>

<body>

<div class="box">
    <h2>📝 To-Do List</h2>

    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter task">
        <button class="add-btn" onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>

function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value;

    if (task === "") {
        alert("Enter something!");
        return;
    }

    let li = document.createElement("li");

    // Task text
    let span = document.createElement("span");
    span.className = "task-text";
    span.innerText = task;

    // Buttons container
    let actions = document.createElement("div");
    actions.className = "actions";

    // Edit button
    let editBtn = document.createElement("button");
    editBtn.innerText = "Edit";
    editBtn.className = "edit";

    editBtn.onclick = function () {
        let newTask = prompt("Edit your task:", span.innerText);
        if (newTask !== null && newTask !== "") {
            span.innerText = newTask;
        }
    };

    // Delete button
    let deleteBtn = document.createElement("button");
    deleteBtn.innerText = "X";
    deleteBtn.className = "delete";

    deleteBtn.onclick = function () {
        li.remove();
    };

    // Append buttons
    actions.appendChild(editBtn);
    actions.appendChild(deleteBtn);

    li.appendChild(span);
    li.appendChild(actions);

    document.getElementById("taskList").appendChild(li);

    input.value = "";
}

</script>

</body>
</html>
