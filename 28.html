<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Dashboard</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #333;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
            color: #fff;
            letter-spacing: 1px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            padding: 30px;
        }

        .chart-box {
            width: 320px;
            height: 280px;
            background: #fff;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .chart-box:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }

        .chart-box h4 {
            margin-bottom: 10px;
            color: #555;
        }

        canvas {
            max-width: 100%;
            max-height: 200px;
        }

        /* Optional: smooth fade-in animation */
        .chart-box {
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<h2>📊 Student Performance Dashboard</h2>

<div class="container">

    <!-- Line Chart -->
    <div class="chart-box">
        <h4>Marks (Weekly)</h4>
        <canvas id="lineChart"></canvas>
    </div>

    <!-- Bar Chart -->
    <div class="chart-box">
        <h4>Attendance (%)</h4>
        <canvas id="barChart"></canvas>
    </div>

    <!-- Pie Chart -->
    <div class="chart-box">
        <h4>Progress Distribution</h4>
        <canvas id="pieChart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const tests = ["Test1", "Test2", "Test3", "Test4", "Test5"];
    const marks = [70, 75, 80, 78, 85];

    const subjects = ["Math", "Science", "English", "Computer"];
    const attendance = [85, 90, 80, 95];

    const progressLabels = ["Completed", "Pending", "Not Started"];
    const progressData = [60, 25, 15];

    // LINE CHART
    new Chart(document.getElementById("lineChart"), {
        type: 'line',
        data: {
            labels: tests,
            datasets: [{
                label: "Marks",
                data: marks,
                borderColor: "#ff6b6b",
                backgroundColor: "rgba(255,107,107,0.2)",
                fill: true,
                tension: 0.4,
                pointRadius: 5
            }]
        }
    });

    // BAR CHART
    new Chart(document.getElementById("barChart"), {
        type: 'bar',
        data: {
            labels: subjects,
            datasets: [{
                label: "Attendance %",
                data: attendance,
                backgroundColor: "#4ecdc4",
                borderRadius: 10
            }]
        }
    });

    // PIE CHART
    new Chart(document.getElementById("pieChart"), {
        type: 'pie',
        data: {
            labels: progressLabels,
            datasets: [{
                data: progressData,
                backgroundColor: ["#1dd1a1", "#feca57", "#ff6b6b"]
            }]
        }
    });
</script>

</body>
</html>
