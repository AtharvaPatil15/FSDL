<!DOCTYPE html>
<html>
<head>
    <title>String Operations</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 380px;
            text-align: center;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 15px;
        }

        input {
            padding: 10px;
            width: 90%;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .reverse { background: #ff6b6b; }
        .upper { background: #4ecdc4; }
        .lower { background: #1a73e8; }
        .length { background: #f7b731; }
        .palindrome { background: #9b59b6; }
        .vowels { background: #2ecc71; }
        .remove { background: #e67e22; }
        .capitalize { background: #34495e; }
        .replace { background: #e84393; }

        p {
            margin-top: 15px;
            font-weight: bold;
            background: #f1f1f1;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>String Operations</h2>

    <input type="text" id="textInput" placeholder="Enter text">

    <!-- Replace Inputs -->
    <input type="text" id="findText" placeholder="Find word">
    <input type="text" id="replaceText" placeholder="Replace with">

    <div class="buttons">
        <button class="reverse" onclick="reverseText()">Reverse</button>
        <button class="upper" onclick="toUpper()">Uppercase</button>
        <button class="lower" onclick="toLower()">Lowercase</button>
        <button class="length" onclick="getLength()">Length</button>
        <button class="palindrome" onclick="checkPalindrome()">Palindrome</button>
        <button class="vowels" onclick="countVowels()">Vowels</button>
        <button class="remove" onclick="removeSpaces()">Remove Spaces</button>
        <button class="capitalize" onclick="capitalizeText()">Capitalize</button>
        <button class="replace" onclick="replaceWord()">Replace</button>
    </div>

    <p id="result">Result will appear here</p>
</div>

<script>

// Reverse
function reverseText() {
    let str = getInput();
    document.getElementById("result").innerText =
        "Reversed: " + str.split("").reverse().join("");
}

// Uppercase
function toUpper() {
    let str = getInput();
    document.getElementById("result").innerText =
        "Uppercase: " + str.toUpperCase();
}

// Lowercase
function toLower() {
    let str = getInput();
    document.getElementById("result").innerText =
        "Lowercase: " + str.toLowerCase();
}

// Length
function getLength() {
    let str = getInput();
    document.getElementById("result").innerText =
        "Length: " + str.length;
}

// Palindrome
function checkPalindrome() {
    let str = getInput().replace(/\s/g, "").toLowerCase();
    let rev = str.split("").reverse().join("");

    document.getElementById("result").innerText =
        (str === rev) ? "Palindrome ✅" : "Not a Palindrome ❌";
}

// Count vowels
function countVowels() {
    let str = getInput().toLowerCase();
    let count = (str.match(/[aeiou]/g) || []).length;

    document.getElementById("result").innerText =
        "Vowels: " + count;
}

// Remove spaces
function removeSpaces() {
    let str = getInput();
    document.getElementById("result").innerText =
        "Without spaces: " + str.replace(/\s/g, "");
}

// Capitalize first letter of each word
function capitalizeText() {
    let str = getInput();
    let result = str.split(" ").map(word =>
        word.charAt(0).toUpperCase() + word.slice(1)
    ).join(" ");

    document.getElementById("result").innerText =
        "Capitalized: " + result;
}

// Replace word
function replaceWord() {
    let str = getInput();
    let find = document.getElementById("findText").value;
    let replace = document.getElementById("replaceText").value;

    if (find === "") {
        alert("Enter word to find");
        return;
    }

    document.getElementById("result").innerText =
        "Updated: " + str.replaceAll(find, replace);
}

// Common input check
function getInput() {
    let str = document.getElementById("textInput").value;

    if (str === "") {
        alert("Please enter text");
        throw "No input";
    }
    return str;
}

</script>

</body>
</html>
