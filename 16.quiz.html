<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>

    <style>
      /* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body */
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 30px 15px;
}

/* Quiz Card */
.quiz-container {
    background: #ffffff;
    width: 100%;
    max-width: 700px;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: fadeIn 0.5s ease-in-out;
}

/* Question */
#questionCount {
    margin-bottom: 18px;
    color: #667eea;
    font-size: 14px;
    font-weight: bold;
}

.question-box {
    margin-bottom: 22px;
}

.question-text {
    margin-bottom: 12px;
    font-size: 20px;
    color: #333;
}

/* Options */
.option {
    display: flex;
    align-items: center;
    margin: 12px 0;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    transition: 0.3s;
    cursor: pointer;
}

/* Hover */
.option:hover {
    background: #f5f7ff;
    border-color: #667eea;
}

/* Radio */
.option input {
    margin-right: 10px;
    cursor: pointer;
}

/* Button */
.btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(to right, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 20px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

/* Button hover */
.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Result */
#finalResult {
    text-align: center;
    margin-top: 25px;
    font-size: 22px;
    font-weight: bold;
    color: #ffffff;
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
    </style>
</head>

<body>

<div class="quiz-container">

    <h2>Simple Quiz</h2>
    <p id="questionCount">Total Questions: 5</p>

    <div class="question-box">
        <p class="question-text">1. HTML stands for?</p>
        <label class="option"><input type="radio" name="q1" value="0"> Hyper Text Markup Language</label>
        <label class="option"><input type="radio" name="q1" value="1"> High Text Machine</label>
        <label class="option"><input type="radio" name="q1" value="2"> Tool Language</label>
        <label class="option"><input type="radio" name="q1" value="3"> None</label>
    </div>

    <div class="question-box">
        <p class="question-text">2. CSS is used for?</p>
        <label class="option"><input type="radio" name="q2" value="0"> Structure</label>
        <label class="option"><input type="radio" name="q2" value="1"> Styling</label>
        <label class="option"><input type="radio" name="q2" value="2"> Database</label>
        <label class="option"><input type="radio" name="q2" value="3"> Logic</label>
    </div>

    <div class="question-box">
        <p class="question-text">3. JavaScript is?</p>
        <label class="option"><input type="radio" name="q3" value="0"> Programming Language</label>
        <label class="option"><input type="radio" name="q3" value="1"> Database</label>
        <label class="option"><input type="radio" name="q3" value="2"> OS</label>
        <label class="option"><input type="radio" name="q3" value="3"> Browser</label>
    </div>

    <div class="question-box">
        <p class="question-text">4. Which tag is used to create a hyperlink in HTML?</p>
        <label class="option"><input type="radio" name="q4" value="0"> &lt;a&gt;</label>
        <label class="option"><input type="radio" name="q4" value="1"> &lt;link&gt;</label>
        <label class="option"><input type="radio" name="q4" value="2"> &lt;href&gt;</label>
        <label class="option"><input type="radio" name="q4" value="3"> &lt;url&gt;</label>
    </div>

    <div class="question-box">
        <p class="question-text">5. Which CSS property changes text color?</p>
        <label class="option"><input type="radio" name="q5" value="0"> font-style</label>
        <label class="option"><input type="radio" name="q5" value="1"> color</label>
        <label class="option"><input type="radio" name="q5" value="2"> text-align</label>
        <label class="option"><input type="radio" name="q5" value="3"> background</label>
    </div>

    <!-- Button -->
    <button class="btn" onclick="submitQuiz()">Submit Quiz</button>

</div>

<!-- Result -->
<h3 id="finalResult"></h3>

<script>
function submitQuiz() {
    let score = 0;
    
    if (document.querySelector("input[name='q1']:checked")?.value == "0") score++;
    if (document.querySelector("input[name='q2']:checked")?.value == "1") score++;
    if (document.querySelector("input[name='q3']:checked")?.value == "0") score++;
    if (document.querySelector("input[name='q4']:checked")?.value == "0") score++;
    if (document.querySelector("input[name='q5']:checked")?.value == "1") score++;

    document.getElementById("finalResult").innerText =
        "Your Score: " + score + " / 5";
}

</script>

</body>
</html>
